<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordy Rodriguez</title>
    <meta name="description" content="Blog">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="pics/jr.jpg">
    <link rel="shortcut icon" type="image/jpeg" href="pics/jr.jpg">
    <link rel="apple-touch-icon" href="pics/jr.jpg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600&display=swap">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <!-- Blog Hero -->
        <section class="hero">
            <h1 class="hero-name">Blog</h1>
        </section>

        <!-- Writing / Posts Table of Contents -->
        <section class="writing">
            <h2 class="section-header">Blog</h2>
            <div id="posts-list" class="posts-list"></div>
        </section>

        <!-- Blog Post View (Hidden by default) -->
        <article id="post-view" class="post-view hidden">
            <button class="back-button" onclick="showPostsList()">← Back</button>
            <div id="post-content" class="post-content"></div>
        </article>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/marked.min.js"></script>
    <script src="blog.js"></script>
</body>
</html>
